name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Inject Mapbox token
        env:
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
        run: |
          if [ -n "$MAPBOX_TOKEN" ]; then
            python3 - <<'PY'
          import os, re
          path = "js/config.js"
          token = os.environ["MAPBOX_TOKEN"]
          text = open(path, encoding="utf-8").read()
          text = re.sub(r"mapboxToken:\s*''", f"mapboxToken: {repr(token)}", text, count=1)
          open(path, "w", encoding="utf-8").write(text)
          print("Token injected for GitHub Pages build")
          PY
          else
            echo "Warning: MAPBOX_ACCESS_TOKEN secret not set — map will not load on Pages"
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - id: deployment
        uses: actions/deploy-pages@v4
